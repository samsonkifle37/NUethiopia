<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1A1612;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2D2619;stop-opacity:1" />
        </linearGradient>
        <pattern id="gridPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#ffffff" fill-opacity="0.05"/>
        </pattern>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="800" height="600" fill="url(#bgGrad)" />
    <rect width="800" height="600" fill="url(#gridPattern)" />

    <!-- Stylized Hotel Icon / Door -->
    <g transform="translate(350, 200)" opacity="0.8">
        <rect x="0" y="0" width="100" height="140" rx="12" fill="none" stroke="#D4AF37" stroke-width="4" stroke-opacity="0.6" />
        <rect x="15" y="15" width="70" height="125" rx="6" fill="#D4AF37" fill-opacity="0.1" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.8" />
        <circle cx="70" cy="80" r="4" fill="#D4AF37" />
        <path d="M 0 140 L 100 140" stroke="#D4AF37" stroke-width="4" stroke-opacity="0.6"/>
    </g>

    <!-- Branding Text -->
    <text x="400" y="420" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff" opacity="0.9" text-anchor="middle" letter-spacing="4">
        NU (ኑ) STAYS
    </text>
    
    <text x="400" y="450" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#D4AF37" opacity="0.7" text-anchor="middle" letter-spacing="2">
        AWAITING HOST UPLOAD
    </text>
</svg>
